services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - config/.env
    environment:
      - DB_PATH=/app/data/bot.sqlite
    volumes:
      # Монтируем код — правки сразу в контейнере
      - .:/app
      # Исключаем venv из монтирования, если он есть локально
      - /app/__pycache__
    stdin_open: true
    tty: true
